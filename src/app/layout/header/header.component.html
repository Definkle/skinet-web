<header class="shadow-md p-3 w-full">
  <div class="flex align-middle items-center justify-between max-w-screen-2xl mx-auto">
    <img routerLink="/" src="/images/logo.png" alt="app logo" class="app-logo max-h-16" />
    <nav class="flex gap-3 my-2 uppercase text-2xl">
      @for (nav of navLinks; track nav) {
        <a
          routerLink="{{ nav.link }}"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          >{{ nav.label }}</a
        >
      }
    </nav>
    <div class="flex gap-3 align-middle">
      <a routerLink="/cart" matBadge="5" matBadgeSize="large" class="custom-badge mt-2 mr-2">
        <mat-icon>shopping_cart</mat-icon>
      </a>
      <button mat-stroked-button routerLink="/login">Login</button>
      <button mat-stroked-button routerLink="/register">Register</button>
    </div>
  </div>
</header>



@if (GlobalStore.isLoading()) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}
